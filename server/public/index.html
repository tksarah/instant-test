<body>
  <a class="skip-link" href="#main-content">コンテンツへスキップ</a>
  <main id="main-content" class="container">
    <header class="app-topbar" role="banner">
      <div class="app-brand" role="heading" aria-level="1">
        <div class="app-brand-mark">IT</div>
        <div class="app-brand-copy"><strong>InstantTest</strong><span>教師向けテスト管理</span></div>
      </div>
      <div class="app-topbar-actions">
        <a class="btn btn-primary" href="/app.html">ダッシュボードを開く</a>
      </div>
    </header>

    <section class="task-page-hero" aria-labelledby="hero-title">
      <div>
        <div class="eyebrow">評価をもっと簡単に</div>
        <h1 id="hero-title">InstantTest — シンプルで強力なテストツール</h1>
        <p class="lead">教材から問題を自動生成し、QRで配布。採点・レポートで授業を支援します。</p>

        <div class="task-stat-card__label">自動問題生成</div>
        <div class="task-stat-card__value">AIサポート</div>
        <div class="task-stat-card__note">教材テキストから問題を生成</div>
      </div>
      <div class="task-stat-card">
        <div class="task-stat-card__label">共有</div>
        <div class="task-stat-card__value">QRコード</div>
        <div class="task-stat-card__note">生徒はコードで簡単参加</div>
      </div>
      <div class="task-stat-card">
        <div class="task-stat-card__label">採点</div>
        <div class="task-stat-card__value">自動 & レポート</div>
        <div class="task-stat-card__note">即座にフィードバック</div>
      </div>
    </section>

    <footer style="margin-top:40px;text-align:center;color:var(--text-soft);font-size:13px;">
