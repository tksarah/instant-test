<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>Instant Test — シンプルで強力なテストツール</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="InstantTest は教師と生徒のためのシンプルなテスト作成・配布・採点プラットフォームです。AIで問題生成、QRで共有、即時採点を提供します。">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%2318324a'/%3E%3Ctext x='50' y='60' font-size='50' text-anchor='middle' fill='white' font-family='Inter,Arial,sans-serif'%3EIT%3C/text%3E%3C/svg%3E">
  <meta property="og:title" content="Instant Test — シンプルで強力なテストツール">
  <meta property="og:description" content="AIで問題生成、QRで共有、即時採点まで。教師の負担を減らすシンプルなテストツールです。">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="/">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
  <link rel="stylesheet" href="/cover.css">
</head>
<body>
  <a class="skip-link" href="#main-content">コンテンツへスキップ</a>
  <main id="main-content" class="container">
    <!-- ブランドカードは削除されました -->

    <section class="cover-card box" aria-labelledby="hero-title">
      <div class="cover-grid">
        <div class="cover-left">
          <h1 id="hero-title" class="hero-title">
            <span class="title-main">Instant Test</span>
            <span class="title-sub">ー シンプルで強力なテストツール</span>
          </h1>
          <p class="lead">教材から問題を自動生成し、QRで配布。採点と分析で授業を支援します。</p>
          <div class="hero-actions" style="margin-top:18px">
            <button id="open-login" class="btn btn-start" type="button">はじめる</button>
          </div>
        </div>
        <aside class="cover-right" aria-labelledby="features-heading">
          <h3 id="features-heading">主な機能</h3>
          <ul class="feature-list">
            <li>教材テキストからの問題の自動生成</li>
            <li>問題へのQRコード（URL）アクセス</li>
            <li>採点と分析</li>
          </ul>
        </aside>
      </div>
    </section>
    <footer style="margin-top:40px;text-align:center;color:var(--text-soft);font-size:13px;">
      <div>Builder: tksarah Version: β</div>
    </footer>
  </main>

  <!-- Login modal (hidden by default) -->
  <div id="login-modal" class="modal" role="dialog" aria-modal="true" aria-hidden="true" style="display:none;">
    <div class="modal-backdrop" id="login-backdrop"></div>
    <div class="modal-panel" role="document" style="max-width:540px;margin:48px auto;">
      <section class="box" aria-labelledby="login-title">
        <h1 id="login-title" style="font-size:22px;margin-bottom:10px;">ログイン</h1>
        <p class="small" style="margin-bottom:14px;">登録済みの教師ユーザーでログインしてください（β版）。</p>

        <form id="login-form" class="task-form-stack" autocomplete="on">
          <div style="display:grid;gap:8px;margin-bottom:12px;">
            <label for="username">ユーザー名</label>
            <input id="username" name="username" type="text" required />
          </div>
          <div style="display:grid;gap:8px;margin-bottom:12px;">
            <label for="password">パスワード</label>
            <input id="password" name="password" type="password" required />
          </div>
          <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
            <button class="btn btn-primary" type="submit">ログイン</button>
            <a class="btn btn-ghost" href="/admin.html">ユーザー管理（管理者）</a>
            <button id="close-login" class="btn btn-ghost" type="button">閉じる</button>
          </div>
          <div id="login-message" class="status-message" aria-live="polite"></div>
        </form>
      </section>
    </div>
  </div>

  <script>
  (function(){
    var openBtn = document.getElementById('open-login');
    var modal = document.getElementById('login-modal');
    var backdrop = document.getElementById('login-backdrop');
    var closeBtn = document.getElementById('close-login');

    function showModal(){
      modal.style.display = 'block';
      modal.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
      var first = modal.querySelector('input,button,a');
      if(first) first.focus();
    }
    function hideModal(){
      modal.style.display = 'none';
      modal.setAttribute('aria-hidden','true');
      document.body.style.overflow = '';
    }

    openBtn && openBtn.addEventListener('click', function(){ showModal(); });
    closeBtn && closeBtn.addEventListener('click', function(){ hideModal(); });
    backdrop && backdrop.addEventListener('click', function(){ hideModal(); });

    // If the page is loaded with ?showLogin, open modal
    try{ if(new URLSearchParams(window.location.search).get('showLogin')) showModal(); }catch(e){}
  })();
  </script>
  <script src="/login.js"></script>
</body>
</html>
