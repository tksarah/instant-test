<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>InstantTest — 教師ユーザー管理</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/styles.css">
  <style>
    .admin-page{
      display:grid;
      gap:18px;
    }
    .admin-hero{
      position:relative;
      overflow:hidden;
    }
    .admin-hero::after{
      content:'';
      position:absolute;
      inset:auto -40px -50px auto;
      width:220px;
      height:220px;
      border-radius:999px;
      background:radial-gradient(circle, rgba(255,255,255,0.28), rgba(255,255,255,0));
      pointer-events:none;
    }
    .admin-two-column{
      display:grid;
      grid-template-columns:minmax(280px, 420px) minmax(0, 1fr);
      gap:18px;
      align-items:start;
    }
    .admin-panel{
      background:var(--bg-panel);
      border:1px solid var(--border-soft);
      border-radius:24px;
      box-shadow:var(--shadow-soft);
      padding:22px;
    }
    .admin-panel h2{
      font-size:22px;
      margin-bottom:6px;
    }
    .admin-panel p{
      color:var(--text-muted);
    }
    .admin-form{
      display:grid;
      gap:14px;
      margin-top:18px;
    }
    .admin-form-grid{
      display:grid;
      grid-template-columns:repeat(2, minmax(0, 1fr));
      gap:12px;
    }
    .admin-form-grid .admin-field--full{
      grid-column:1 / -1;
    }
    .admin-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
    }
    .admin-list-header{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-end;
      margin-bottom:16px;
      flex-wrap:wrap;
    }
    .admin-list-summary{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .admin-pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      border-radius:999px;
      padding:8px 12px;
      background:var(--color-accent-soft);
      color:var(--color-main);
      font-size:13px;
      font-weight:700;
    }
    .teacher-list-grid{
      display:grid;
      gap:14px;
    }
    .teacher-card{
      display:grid;
      gap:14px;
      padding:18px 20px;
      border-radius:22px;
      background:linear-gradient(180deg, rgba(255,255,255,0.98), rgba(248,250,252,0.96));
      border:1px solid var(--border-soft);
      box-shadow:var(--shadow-card);
    }
    .teacher-card-head{
      display:flex;
      justify-content:space-between;
      gap:16px;
      align-items:flex-start;
      flex-wrap:wrap;
    }
    .teacher-card-title{
      display:grid;
      gap:4px;
    }
    .teacher-card-title strong{
      font-size:19px;
      line-height:1.2;
    }
    .teacher-card-title span{
      color:var(--text-soft);
      font-size:13px;
    }
    .teacher-card-meta{
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(120px, 1fr));
      gap:10px;
    }
    .teacher-metric{
      padding:12px 14px;
      border-radius:16px;
      background:var(--bg-soft);
      border:1px solid var(--border-soft);
    }
    .teacher-metric strong{
      display:block;
      font-size:20px;
      color:var(--color-main);
      line-height:1.1;
    }
    .teacher-metric span{
      display:block;
      margin-top:4px;
      color:var(--text-soft);
      font-size:12px;
    }
    .teacher-card-foot{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
    }
    .teacher-card-foot p{
      font-size:13px;
      color:var(--text-soft);
    }
    .btn-danger{
      background:#fff4ee;
      color:#9a3412;
      border-color:rgba(221,107,32,0.25);
    }
    .btn-danger:hover{
      background:#ffe7d9;
    }
    .admin-empty{
      padding:24px;
      text-align:center;
      border-radius:22px;
      background:var(--bg-soft);
      border:1px dashed rgba(24,50,74,0.16);
      color:var(--text-muted);
    }
    @media (max-width: 900px){
      .admin-two-column,
      .admin-form-grid{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main-content">コンテンツへスキップ</a>
  <main id="main-content" class="container">
    <header class="app-topbar" role="banner">
      <div class="app-brand" role="heading" aria-level="1">
        <div class="app-brand-mark">IT</div>
        <div class="app-brand-copy"><strong>InstantTest</strong><span>教師ユーザー管理</span></div>
      </div>
      <div class="app-topbar-actions">
        <a class="btn btn-ghost" href="/login.html">ログインへ</a>
      </div>
    </header>

    <div class="admin-page">
      <section class="task-page-hero compact admin-hero" aria-labelledby="admin-page-title">
        <div>
          <div class="eyebrow">Teacher Console</div>
          <h1 id="admin-page-title">教師ユーザーの追加と完全削除</h1>
          <p class="lead">削除すると、その教師が持つクラス、テスト、問題、生徒回答、試験セッション、ログインセッションをまとめて消去します。</p>
        </div>
      </section>

      <div class="admin-two-column">
        <section class="admin-panel" aria-labelledby="admin-auth-title">
          <h2 id="admin-auth-title">管理者認証</h2>
          <p>この端末で使う管理者パスワードを保存し、一覧取得と追加・削除を有効にします。</p>
          <form id="admin-auth-form" class="admin-form">
            <div>
              <label for="admin-password">管理者パスワード</label>
              <input id="admin-password" type="password" autocomplete="current-password" />
            </div>
            <div class="admin-actions">
              <button id="admin-save" class="btn btn-primary" type="submit">認証して開始</button>
              <button id="admin-clear" class="btn btn-ghost" type="button">保存を消去</button>
            </div>
            <div id="admin-auth-message" class="status-message" aria-live="polite"></div>
          </form>
        </section>

        <section class="admin-panel" aria-labelledby="teacher-create-title">
          <h2 id="teacher-create-title">教師ユーザーを追加</h2>
          <p>ログイン ID、表示名、初期パスワードを入力すると、すぐに一覧へ反映されます。</p>
          <form id="teacher-create-form" class="admin-form">
            <div class="admin-form-grid">
              <div>
                <label for="teacher-username">ユーザー名</label>
                <input id="teacher-username" type="text" autocomplete="off" required />
              </div>
              <div>
                <label for="teacher-display-name">表示名</label>
                <input id="teacher-display-name" type="text" autocomplete="off" />
              </div>
              <div class="admin-field--full">
                <label for="teacher-password">初期パスワード</label>
                <input id="teacher-password" type="password" autocomplete="new-password" required />
              </div>
            </div>
            <div class="admin-actions">
              <button class="btn btn-primary" type="submit">追加する</button>
            </div>
            <div id="teacher-create-message" class="status-message" aria-live="polite"></div>
          </form>
        </section>
      </div>

      <section class="admin-panel" aria-labelledby="teacher-list-title">
        <div class="admin-list-header">
          <div>
            <h2 id="teacher-list-title">登録済みの教師ユーザー</h2>
            <p>不要な教師を 1 操作で完全削除できます。削除前に消えるデータ件数を表示します。</p>
          </div>
          <div class="admin-list-summary" id="teacher-list-summary" aria-live="polite"></div>
        </div>
        <div id="teacher-list-message" class="status-message" aria-live="polite"></div>
        <div id="teacher-list"></div>
      </section>
    </div>
  </main>

  <script src="/admin.js"></script>
</body>
</html>
