<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <title>InstantTest</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="color-scheme" content="light dark">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="/styles.css">
  <script src="/vendor/react/umd/react.development.js"></script>
  <script src="/vendor/react-dom/umd/react-dom.development.js"></script>
</head>
<body>
  <a class="skip-link" href="#main-content">コンテンツへスキップ</a>
  <div id="root"></div>
  <script>
    (function(){
      function showError(msg){
        var root = document.getElementById('root');
        if(root) root.innerHTML = '<div style="color:#900;padding:20px;background:#fff;border:1px solid #f3c2c2;border-radius:6px;">' + msg + '</div>';
      }
      if(typeof React === 'undefined' || typeof ReactDOM === 'undefined'){
        showError('React/ReactDOM のローカル配信に失敗しました。サーバー再起動後に再読み込みしてください。');
      } else {
        var s = document.createElement('script');
        s.src = '/app.js';
        document.body.appendChild(s);
      }
    })();
  </script>
</body>
</html>
