services:
  app:
    build:
      context: ./server
    image: instanttest-server:latest
    restart: unless-stopped
    environment:
      - PORT=3000
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL}
    volumes:
      - ./data/data.sqlite:/app/data.sqlite
      - ./server:/app
      - server_node_modules:/app/node_modules
      - ./backups:/backup
    networks:
      - web

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app

volumes:
  server_node_modules:
  caddy_data:
  caddy_config:

networks:
  web:
